<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Hue Adjustment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .box {
            width: 200px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }

        .primary {
            background-color: #0000FF;
            /* Primary color set to blue */
            color: white;
        }

        .target {
            background-color: var(--target-color, red);
            color: white;
        }

        .converted {
            background-color: var(--target-color, red);
            color: white;
        }

        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .info {
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Dynamic Hue Adjustment</h1>
    <div class="container">
        <div class="box primary">Primary Color</div>
        <div class="box target">Target Color</div>
        <div class="box converted">Converted Color</div>
        <div class="box info">B: 0%, C: 0%, H: 0deg</div>
    </div>

    <div class="input-container">
        <label for="primaryColor">Set Primary Color:</label>
        <input type="color" id="primaryColor" value="#0000FF">

        <label for="targetColor">Set Target Color:</label>
        <input type="color" id="targetColor" value="#ff0000">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const primaryColorInput = document.getElementById("primaryColor");
            const targetColorInput = document.getElementById("targetColor");

            const primaryBox = document.querySelector(".primary");
            const targetBox = document.querySelector(".target");
            const convertedBox = document.querySelector(".converted");
            const infoBox = document.querySelector(".info");


            function hexToHSL(hex) {
                let r = parseInt(hex.slice(1, 3), 16) / 255;
                let g = parseInt(hex.slice(3, 5), 16) / 255;
                let b = parseInt(hex.slice(5, 7), 16) / 255;

                let max = Math.max(r, g, b);
                let min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0;
                } else {
                    let d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r:
                            h = (g - b) / d + (g < b ? 6 : 0);
                            break;
                        case g:
                            h = (b - r) / d + 2;
                            break;
                        case b:
                            h = (r - g) / d + 4;
                            break;
                    }
                    h *= 60;
                }

                return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
            }

            //Update colors
            function updateColors() {
                const primaryColor = primaryColorInput.value;
                const targetColor = targetColorInput.value;

                //Convert Primary and Target colors to HSL
                const primaryHSL = hexToHSL(primaryColor);
                const targetHSL = hexToHSL(targetColor);

                //Calculate adjustments
                const hueShift = targetHSL.h - primaryHSL.h;
                const brightness = targetHSL.l - primaryHSL.l;
                const contrast = targetHSL.s - primaryHSL.s;

                //Update box colors
                primaryBox.style.backgroundColor = primaryColor;
                targetBox.style.backgroundColor = targetColor;
                convertedBox.style.backgroundColor = targetColor;

                //Update info box
                infoBox.textContent = `B: ${brightness}%, C: ${contrast}%, H: ${hueShift}deg`;
            }

            //Init update
            updateColors();

            //Update on input changes
            primaryColorInput.addEventListener("input", updateColors);
            targetColorInput.addEventListener("input", updateColors);
        });
    </script>
</body>

</html>
